<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuizMaster — Algemene Kennis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="game.css">
</head>
<body>

  <!-- START SCHERM -->
  <div id="screen-start" class="screen active">
    <div class="card start-card">
      <div class="logo">🧠</div>
      <h1>QuizMaster</h1>
      <p class="subtitle">Test jouw algemene kennis!<br>10 vragen · 15 seconden per vraag</p>
      <div class="difficulty-row">
        <button class="diff-btn active" data-diff="easy">Makkelijk</button>
        <button class="diff-btn" data-diff="medium">Gemiddeld</button>
        <button class="diff-btn" data-diff="hard">Moeilijk</button>
      </div>
      <button class="btn-primary" id="btn-start">Start de Quiz!</button>
    </div>
  </div>

  <!-- QUIZ SCHERM -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-wrap">
      <div class="quiz-header">
        <div class="q-meta">
          <span id="q-num">Vraag 1</span>
          <span id="q-score">Score: 0</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="timer-row">
          <div class="timer-ring">
            <svg viewBox="0 0 44 44" width="44" height="44">
              <circle cx="22" cy="22" r="18" fill="none" stroke="#e2e8f0" stroke-width="4"/>
              <circle cx="22" cy="22" r="18" fill="none" stroke="#2563eb" stroke-width="4"
                stroke-dasharray="113" stroke-dashoffset="0" id="timer-circle"
                stroke-linecap="round" transform="rotate(-90 22 22)"/>
            </svg>
            <span id="timer-num">15</span>
          </div>
        </div>
      </div>

      <div class="card question-card">
        <div class="category-tag" id="q-category">Geografie</div>
        <p class="question-text" id="q-text">Wat is de hoofdstad van België?</p>
      </div>

      <div class="answers-grid" id="answers-grid">
        <!-- ingevuld door JS -->
      </div>

      <div class="feedback-bar" id="feedback-bar">
        <span id="feedback-icon">✓</span>
        <span id="feedback-text">Juist!</span>
        <span id="feedback-correct"></span>
      </div>
    </div>
  </div>

  <!-- RESULTAAT SCHERM -->
  <div id="screen-result" class="screen">
    <div class="card result-card">
      <div class="result-emoji" id="result-emoji">🏆</div>
      <h2 id="result-title">Uitstekend!</h2>
      <div class="score-circle">
        <svg viewBox="0 0 120 120" width="120" height="120">
          <circle cx="60" cy="60" r="50" fill="none" stroke="#e2e8f0" stroke-width="8"/>
          <circle cx="60" cy="60" r="50" fill="none" stroke="#2563eb" stroke-width="8"
            stroke-dasharray="314" stroke-dashoffset="314" id="result-arc"
            stroke-linecap="round" transform="rotate(-90 60 60)"/>
        </svg>
        <div class="score-inside">
          <strong id="result-score">0</strong>
          <span>/ 10</span>
        </div>
      </div>
      <p class="result-sub" id="result-sub">Je hebt 8 van de 10 vragen goed beantwoord.</p>
      <div class="result-stats" id="result-stats"></div>
      <div class="result-btns">
        <button class="btn-primary" id="btn-restart">Opnieuw spelen</button>
        <button class="btn-secondary" id="btn-menu">Terug naar menu</button>
      </div>
    </div>
  </div>

<script src="game.js"></script>
</body>
</html>
